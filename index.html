<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartão Virtual - Bolos Caseiros Express</title>
  <style>
    :root{
      --brand:#f56a00;
      --brand-dark:#d85a00;
      --ink:#111111;
      --soft:#fff7f0;
      --card:rgba(255,255,255,0.16);
      --line:rgba(255,255,255,0.25);
      --shadow:0 20px 50px rgba(0,0,0,0.18);
      --radius:28px;
    }

    *{box-sizing:border-box}
    html,
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
      color:#111;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      background:
        linear-gradient(135deg, #ff7a00 0%, #f56a00 42%, #d85a00 100%);
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:url('492D7F4B-425D-472A-8EC1-829AD16FDA00.jpeg') center/cover no-repeat;
      opacity:0.18;
      filter: blur(8px);
      transform: scale(1.1);
      z-index:-1;
    }

    
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
      color:#111;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      background:
        linear-gradient(135deg, #ff7a00 0%, #f56a00 42%, #d85a00 100%);
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:url('492D7F4B-425D-472A-8EC1-829AD16FDA00.jpeg') center/cover no-repeat;
      opacity:0.18;
      filter: blur(8px);
      transform: scale(1.1);
      z-index:-1;
    }


    .frame{
      width:min(460px, 100%);
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
      position:relative;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.18), transparent 22%),
        radial-gradient(circle at 10% 10%, rgba(255,255,255,0.18), transparent 22%);
      opacity:.85;
    }

    .top{
      padding:34px 28px 16px;
      text-align:center;
      position:relative;
      z-index:1;
    }

    .logo-wrap{
      width:clamp(132px, 30vw, 156px);
      height:clamp(132px, 30vw, 156px);
      margin:0 auto 16px;
      border-radius:50%;
      background:radial-gradient(circle at 30% 28%, #ff9a3d 0%, var(--brand) 42%, var(--brand-dark) 100%);
      border:6px solid rgba(255,255,255,0.95);
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 16px 40px rgba(0,0,0,0.18);
      overflow:hidden;
    }

    .logo{
      width:100%;
      height:100%;
      display:block;
      object-fit:contain;
      border-radius:50%;
    }

    .title{
      margin:8px 0 4px;
      font-size:1.55rem;
      font-weight:700;
      letter-spacing:.03em;
    }

    .subtitle{
      margin:0;
      color:rgba(17,17,17,0.75);
      font-size:.98rem;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .buttons{
      padding:18px 22px 26px;
      display:grid;
      gap:14px;
      position:relative;
      z-index:1;
    }

    .btn{
      text-decoration:none;
      color:var(--ink);
      background:rgba(255,255,255,0.80);
      border:1px solid rgba(255,255,255,0.85);
      border-radius:18px;
      min-height:58px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-size:1rem;
      font-weight:600;
      letter-spacing:.01em;
      box-shadow:0 8px 24px rgba(0,0,0,0.08);
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
      padding:0 18px;
    }

    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 12px 28px rgba(0,0,0,0.12);
      background:rgba(255,255,255,0.92);
    }

    .btn:active{
      transform:translateY(0);
    }

    .icon{
      width:20px;
      height:20px;
      opacity:.85;
      flex:0 0 auto;
    }

    .footer{
      padding:0 22px 24px;
      text-align:center;
      font-size:.84rem;
      color:rgba(17,17,17,0.72);
      position:relative;
      z-index:1;
    }

    .note{
      background:rgba(255,255,255,0.34);
      border-top:1px solid rgba(255,255,255,0.35);
      padding:14px 18px;
      text-align:center;
      font-size:.82rem;
      color:rgba(17,17,17,0.72);
      position:relative;
      z-index:1;
    }

    .pill{
      display:inline-block;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(255,255,255,0.55);
      border:1px solid rgba(255,255,255,0.65);
      margin-top:8px;
      font-size:.78rem;
      letter-spacing:.04em;
    }
  </style>
</head>
